<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini IDE Multi-Agentes</title>
<style>
/* ===================== Estilo geral ===================== */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background:#1e1e1e; color:#cccccc; height:100vh; overflow:hidden; }
.main-container { display:flex; height: 100vh; flex-direction: column; }
.content-area { display:flex; flex: 1; overflow: hidden; }

/* ===================== Sidebar (Estilo VS Code) ===================== */
.sidebar { width:240px; background:#252526; border-right:1px solid #333; display: flex; flex-direction: column; }
.sidebar-header { padding: 10px 15px; font-size: 11px; color: #999; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #333; }
.explorer { flex: 1; overflow-y: auto; padding-top: 5px; }

/* Árvore de Arquivos */
.tree-item { cursor: pointer; display: flex; align-items: center; padding: 4px 10px; font-size: 13px; white-space: nowrap; user-select: none; }
.tree-item:hover { background: #2a2d2e; }
.tree-item.selected { background: #37373d; color: #fff; }
.tree-item .icon { margin-right: 6px; width: 16px; text-align: center; font-size: 10px; color: #888; }
.folder-content { display: none; margin-left: 12px; border-left: 1px solid #333; }
.folder-content.open { display: block; }

/* ===================== Editor Central ===================== */
.editor-container { flex: 1; background:#1e1e1e; display: flex; flex-direction: column; position: relative; border-right: 1px solid #333; }
.editor-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 14px; }
.editor-textarea { flex: 1; width:100%; background:transparent; border:none; outline:none; color:#d4d4d4; resize:none; font-size:14px; font-family: 'Consolas', 'Courier New', monospace; padding: 20px; line-height: 1.5; }
.editor-image-view { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #252526; overflow: auto; }
.editor-image-view img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

/* ===================== Chat Panel (Direita) ===================== */
.chat-panel { width: 350px; background: #252526; display: flex; flex-direction: column; border-left: 1px solid #333; }
.chat-header { padding: 10px 15px; font-size: 11px; color: #999; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #333; }
.chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
.message { background: #2d2d2d; padding: 12px; border-radius: 8px; border: 1px solid #3c3c3c; position: relative; }
.message-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 10px; color: #888; }
.message-content { font-size: 13px; line-height: 1.4; color: #ddd; white-space: pre-wrap; }
.copy-btn { background: #3c3c3c; border: none; color: #ccc; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }
.copy-btn:hover { background: #4c4c4c; color: #fff; }

/* ===================== Prompt Area ===================== */
.prompt-area { background:#252526; border-top:1px solid #333; padding: 15px; width: 100%; }
.prompt-container { max-width: 1200px; margin: 0 auto; display: flex; gap: 12px; align-items: center; }
.plus-wrapper { position:relative; flex-shrink: 0; }
.plus-btn { width:44px; height:44px; border:none; background:#333; color:white; font-size:24px; border-radius:8px; cursor:pointer; display: flex; align-items: center; justify-content: center; }
.prompt-input-wrapper { flex: 1; }
.prompt-input { width: 100%; height: 60px; background: #1e1e1e; color: white; padding: 12px; border-radius: 8px; border: 1px solid #3c3c3c; outline: none; resize: none; font-family: inherit; font-size: 14px; }
.send-btn { height:44px; padding:0 24px; border:none; background:#0078d4; color:white; border-radius:8px; cursor:pointer; font-weight: 600; font-size: 14px; flex-shrink: 0; }

/* ===================== Menu do + ===================== */
.add-menu { position: fixed; background: #252526; border: 1px solid #454545; border-radius: 8px; width: 200px; display: none; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 3000; }
.menu-title { padding: 10px 15px; background: #2d2d2d; border-bottom: 1px solid #3c3c3c; font-size: 11px; color: #aaa; text-transform: uppercase; }
.menu-option { width: 100%; border: none; background: none; color: #ccc; text-align: left; padding: 12px 15px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
.menu-option:hover { background: #37373d; color: white; }
</style>
</head>
<body>

<div class="main-container">
    <div class="content-area">
        <div class="sidebar">
            <div class="sidebar-header">Explorer</div>
            <div class="explorer" id="explorer"></div>
        </div>
        <div class="editor-container" id="editor-view">
            <div class="editor-placeholder">Selecione um arquivo para visualizar</div>
        </div>
        <div class="chat-panel">
            <div class="chat-header">Resultados do Prompt</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message">
                    <div class="message-header"><span>AI Assistant</span><button class="copy-btn" onclick="copyText(this)">Copiar</button></div>
                    <div class="message-content">Olá! Eu sou seu assistente.</div>
                </div>
            </div>
        </div>
    </div>
    <div class="prompt-area">
        <div class="prompt-container">
            <div class="plus-wrapper">
                <button class="plus-btn" id="plusBtn">+</button>
                <div class="add-menu" id="addMenu">
                    <div class="menu-title">Adicionar ao Contexto</div>
                    <button class="menu-option" onclick="document.getElementById('fileInput').click()">📄 Arquivos</button>
                    <button class="menu-option" onclick="document.getElementById('folderInput').click()">📂 Pasta</button>
                    <button class="menu-option" onclick="document.getElementById('imageInput').click()">🖼 Imagem</button>
                </div>
            </div>
            <div class="prompt-input-wrapper"><textarea class="prompt-input" id="promptInput" placeholder="Digite seu comando..."></textarea></div>
            <button class="send-btn" id="sendBtn">Enviar</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" multiple hidden />
<input type="file" id="folderInput" webkitdirectory directory multiple hidden />
<input type="file" id="imageInput" accept="image/*" multiple hidden />

<script>
// =================== Estado Global ===================
let fileSystemRoot = { name: "root", type: "folder", children: {} };
const explorerEl = document.getElementById("explorer");
const editorView = document.getElementById("editor-view");
import { handlePromptFromUI } from './agent.js';

const sendBtn = document.getElementById("sendBtn");
const promptInput = document.getElementById("promptInput");
const chatMessages = document.getElementById("chatMessages");

sendBtn.onclick = async () => {
    const text = promptInput.value.trim();
    if (!text) return;

    // Processar via agente
    await handlePromptFromUI(text, chatMessages);

    // Limpar input
    promptInput.value = "";
};
const plusBtn = document.getElementById("plusBtn");
const addMenu = document.getElementById("addMenu");



// =================== Lógica de Limpeza e Árvore Robustecida ===================
function clearWorkspace() {
    fileSystemRoot = { name: "root", type: "folder", children: {} };
    editorView.innerHTML = '<div class="editor-placeholder">Selecione um arquivo para visualizar</div>';
    explorerEl.innerHTML = "";
}

function addToTree(path, content, type) {
    const parts = path.split('/').filter(p => p);
    let current = fileSystemRoot;
    
    for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const isLast = i === parts.length - 1;
        
        if (isLast) {
            current.children[part] = { name: part, type, content };
        } else {
            if (!current.children[part]) {
                current.children[part] = { name: part, type: "folder", children: {} };
            }
            current = current.children[part];
        }
    }
}

function renderExplorer() {
    explorerEl.innerHTML = "";
    const items = Object.values(fileSystemRoot.children).sort((a, b) => (a.type === b.type ? a.name.localeCompare(b.name) : a.type === "folder" ? -1 : 1));
    items.forEach(item => explorerEl.appendChild(createTreeElement(item)));
}

function createTreeElement(item) {
    const container = document.createElement("div");
    const el = document.createElement("div");
    el.className = "tree-item";
    
    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = item.type === "folder" ? "▶" : (item.type === "image" ? "🖼" : "📄");
    
    const label = document.createElement("span");
    label.textContent = item.name;
    
    el.appendChild(icon);
    el.appendChild(label);
    container.appendChild(el);

    if (item.type === "folder") {
        const content = document.createElement("div");
        content.className = "folder-content";
        
        const children = Object.values(item.children).sort((a, b) => (a.type === b.type ? a.name.localeCompare(b.name) : a.type === "folder" ? -1 : 1));
        children.forEach(child => content.appendChild(createTreeElement(child)));
        
        container.appendChild(content);
        
        el.onclick = (e) => {
            e.stopPropagation();
            const isOpen = content.classList.toggle("open");
            icon.textContent = isOpen ? "▼" : "▶";
        };
    } else {
        el.onclick = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.tree-item').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            openFile(item);
        };
    }
    return container;
}

function openFile(item) {
    editorView.innerHTML = "";
    if (item.type === "image") {
        const div = document.createElement("div");
        div.className = "editor-image-view";
        const img = document.createElement("img");
        img.src = item.content;
        div.appendChild(img);
        editorView.appendChild(div);
    } else {
        const textarea = document.createElement("textarea");
        textarea.className = "editor-textarea";
        textarea.value = item.content;
        editorView.appendChild(textarea);
    }
}

// =================== Handlers de Input (Processamento Robusto) ===================
async function processFiles(filesList, isImage = false) {
    clearWorkspace();
    const filesArray = Array.from(filesList);
    
    const tasks = filesArray.map(file => {
        return new Promise((resolve) => {
            if (isImage) {
                const url = URL.createObjectURL(file);
                addToTree(file.name, url, "image");
                resolve();
            } else {
                const reader = new FileReader();
                reader.onload = () => {
                    const path = file.webkitRelativePath || file.name;
                    addToTree(path, reader.result, "text");
                    resolve();
                };
                reader.readAsText(file);
            }
        });
    });

    await Promise.all(tasks);
    renderExplorer();
}

document.getElementById('fileInput').onchange = (e) => processFiles(e.target.files);
document.getElementById('folderInput').onchange = (e) => processFiles(e.target.files);
document.getElementById('imageInput').onchange = (e) => processFiles(e.target.files, true);

// =================== Outros Handlers ===================
function copyText(btn) {
    const content = btn.parentElement.nextElementSibling.innerText;
    navigator.clipboard.writeText(content).then(() => {
        const oldText = btn.innerText; btn.innerText = "Copiado!";
        setTimeout(() => btn.innerText = oldText, 2000);
    });
}

sendBtn.onclick = () => {
    const text = promptInput.value.trim();
    if (text) {
        const msg = document.createElement("div");
        msg.className = "message";
        msg.innerHTML = `<div class="message-header"><span>AI Response</span><button class="copy-btn" onclick="copyText(this)">Copiar</button></div><div class="message-content">Resultado para: ${text}</div>`;
        chatMessages.appendChild(msg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        promptInput.value = "";
    }
};

plusBtn.onclick = (e) => { 
    e.stopPropagation(); 
    addMenu.style.display = addMenu.style.display === "flex" ? "none" : "flex"; 
    const rect = plusBtn.getBoundingClientRect(); 
    addMenu.style.bottom = (window.innerHeight - rect.top + 15) + "px"; 
    addMenu.style.left = rect.left + "px"; 
};
document.addEventListener("click", () => addMenu.style.display = "none");
</script>
</body>
</html>
