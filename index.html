<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini IDE Multi-Agentes</title>
<style>
/* ===================== Estilo geral ===================== */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background:#1e1e1e; color:#cccccc; height:100vh; overflow:hidden; }
.container { display:flex; height:calc(100vh - 60px); }

/* ===================== Sidebar (Estilo VS Code) ===================== */
.sidebar { width:260px; background:#252526; border-right:1px solid #333; display: flex; flex-direction: column; }
.sidebar-header { padding: 10px 15px; font-size: 11px; color: #999; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #333; }
.explorer { flex: 1; overflow-y: auto; padding-top: 5px; }

/* Árvore de Arquivos */
.tree-item { cursor: pointer; display: flex; align-items: center; padding: 4px 10px; font-size: 13px; white-space: nowrap; user-select: none; }
.tree-item:hover { background: #2a2d2e; }
.tree-item.selected { background: #37373d; color: #fff; }
.tree-item .icon { margin-right: 6px; width: 16px; text-align: center; }
.folder-content { display: none; margin-left: 12px; border-left: 1px solid #333; }
.folder-content.open { display: block; }

/* ===================== Editor ===================== */
.editor { flex:1; background:#1e1e1e; display: flex; flex-direction: column; position: relative; }
.editor-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 14px; }
.editor textarea { flex: 1; width:100%; background:transparent; border:none; outline:none; color:#d4d4d4; resize:none; font-size:14px; font-family: 'Consolas', 'Courier New', monospace; padding: 20px; line-height: 1.5; }
.editor-image-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #252526; overflow: auto; }
.editor-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

/* ===================== Prompt Bar ===================== */
.prompt-bar { position:fixed; bottom:0; left:0; right:0; height:60px; background:#252526; border-top:1px solid #333; display:flex; align-items:center; gap:10px; padding:10px; z-index: 2000; }
.plus-wrapper { position:relative; }
.plus-btn { width:40px; height:40px; border:none; background:#333; color:white; font-size:22px; border-radius:6px; cursor:pointer; transition: background 0.2s; }
.plus-btn:hover { background:#444; }
.prompt { flex:1; height:40px; border:none; outline:none; background:#1e1e1e; color:white; padding:0 12px; border-radius:6px; border: 1px solid #3c3c3c; }
.prompt:focus { border-color: #0078d4; }
.send-btn { height:40px; padding:0 20px; border:none; background:#0078d4; color:white; border-radius:6px; cursor:pointer; font-weight: 500; }
.send-btn:hover { background:#0e86ea; }

/* ===================== Menu do + ===================== */
.add-menu { 
    position: fixed; 
    background: #252526; 
    border: 1px solid #454545; 
    border-radius: 8px; 
    width: 200px; 
    display: none; 
    flex-direction: column; 
    overflow: hidden; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
    z-index: 3000; 
}
.menu-title { padding: 10px 15px; background: #2d2d2d; border-bottom: 1px solid #3c3c3c; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.menu-option { 
    width: 100%; 
    border: none; 
    background: none; 
    color: #ccc; 
    text-align: left; 
    padding: 12px 15px; 
    cursor: pointer; 
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.2s, color 0.2s;
}
.menu-option:hover { background: #37373d; color: white; }
</style>
</head>
<body>

<div class="container">
    <!-- Sidebar / Explorer -->
    <div class="sidebar">
        <div class="sidebar-header">Explorer</div>
        <div class="explorer" id="explorer">
            <!-- Árvore de arquivos será injetada aqui -->
        </div>
    </div>

    <!-- Editor -->
    <div class="editor" id="editor-view">
        <div class="editor-placeholder">Selecione um arquivo para visualizar</div>
    </div>
</div>

<!-- Prompt Bar -->
<div class="prompt-bar">
    <div class="plus-wrapper">
        <button class="plus-btn" id="plusBtn">+</button>
        <div class="add-menu" id="addMenu">
            <div class="menu-title">Adicionar ao Contexto</div>
            <button class="menu-option" onclick="document.getElementById('fileInput').click()"><span>📄</span> Arquivos</button>
            <button class="menu-option" onclick="document.getElementById('folderInput').click()"><span>📂</span> Pasta</button>
            <button class="menu-option" onclick="document.getElementById('imageInput').click()"><span>🖼</span> Imagem</button>
        </div>
    </div>
    <input class="prompt" placeholder="Digite comando ou prompt para agentes..." />
    <button class="send-btn">Enviar</button>
</div>

<!-- Inputs invisíveis -->
<input type="file" id="fileInput" multiple hidden />
<input type="file" id="folderInput" webkitdirectory directory multiple hidden />
<input type="file" id="imageInput" accept="image/*" multiple hidden />

<script>
// =================== Estado Global ===================
let fileSystem = { name: "root", type: "folder", children: {} };
const explorerEl = document.getElementById("explorer");
const editorView = document.getElementById("editor-view");
const plusBtn = document.getElementById("plusBtn");
const addMenu = document.getElementById("addMenu");

// =================== Utilitários de Árvore ===================
function addToTree(path, content, type) {
    const parts = path.split('/').filter(p => p);
    let current = fileSystem;

    for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const isLast = i === parts.length - 1;

        if (isLast) {
            current.children[part] = { name: part, type, content };
        } else {
            if (!current.children[part]) {
                current.children[part] = { name: part, type: "folder", children: {} };
            }
            current = current.children[part];
        }
    }
    renderExplorer();
}

function renderExplorer() {
    explorerEl.innerHTML = "";
    const rootItems = Object.values(fileSystem.children);
    rootItems.sort((a, b) => {
        if (a.type === b.type) return a.name.localeCompare(b.name);
        return a.type === "folder" ? -1 : 1;
    });
    
    rootItems.forEach(item => {
        explorerEl.appendChild(createTreeElement(item));
    });
}

function createTreeElement(item) {
    const container = document.createElement("div");
    const el = document.createElement("div");
    el.className = "tree-item";
    
    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = item.type === "folder" ? "▶" : (item.type === "image" ? "🖼" : "📄");
    
    const label = document.createElement("span");
    label.textContent = item.name;
    
    el.appendChild(icon);
    el.appendChild(label);
    container.appendChild(el);

    if (item.type === "folder") {
        const content = document.createElement("div");
        content.className = "folder-content";
        
        const children = Object.values(item.children);
        children.sort((a, b) => {
            if (a.type === b.type) return a.name.localeCompare(b.name);
            return a.type === "folder" ? -1 : 1;
        });

        children.forEach(child => content.appendChild(createTreeElement(child)));
        container.appendChild(content);

        el.onclick = (e) => {
            e.stopPropagation();
            const isOpen = content.classList.toggle("open");
            icon.textContent = isOpen ? "▼" : "▶";
        };
    } else {
        el.onclick = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.tree-item').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            openFile(item);
        };
    }

    return container;
}

function openFile(item) {
    editorView.innerHTML = "";
    if (item.type === "image") {
        const div = document.createElement("div");
        div.className = "editor-image-container";
        const img = document.createElement("img");
        img.src = item.content;
        div.appendChild(img);
        editorView.appendChild(div);
    } else {
        const textarea = document.createElement("textarea");
        textarea.value = item.content;
        textarea.readOnly = false;
        editorView.appendChild(textarea);
    }
}

// =================== Menu e Eventos ===================
plusBtn.onclick = (e) => {
    e.stopPropagation();
    const isVisible = addMenu.style.display === "flex";
    if (isVisible) {
        addMenu.style.display = "none";
    } else {
        addMenu.style.display = "flex";
        const rect = plusBtn.getBoundingClientRect();
        addMenu.style.bottom = (window.innerHeight - rect.top + 10) + "px";
        addMenu.style.left = rect.left + "px";
    }
};

document.addEventListener("click", () => addMenu.style.display = "none");

// Handlers de Input
document.getElementById('fileInput').addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = () => addToTree(file.name, reader.result, "text");
        reader.readAsText(file);
    });
});

document.getElementById('folderInput').addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = () => addToTree(file.webkitRelativePath, reader.result, "text");
        reader.readAsText(file);
    });
});

document.getElementById('imageInput').addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(file => {
        const url = URL.createObjectURL(file);
        addToTree(file.name, url, "image");
    });
});
</script>

</body>
</html>
