<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL ACCESS | AIForge v2</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/enhancements.css">
    <link rel="stylesheet" href="../css/gradient-fix-final.css">
</head>

<body class="auth-body">

    <!-- Background (Handled by CSS body::before or explicit div if needed) -->
    <!-- Using auth-container's radial gradient instead of inline divs -->

    <!-- Navigation (Minimal) -->
    <nav class="af-navbar glass-nav" style="background: transparent; border: none; box-shadow: none; top: 30px;">
        <a href="../index.html" class="af-brand">
            <i class="fa-solid fa-brain"></i>
            AIFORGE
        </a>
        <a href="../index.html" class="btn-af glass" style="padding: 10px 20px; font-size: 0.8rem;">
            Back to Hub
        </a>
    </nav>

    <!-- Content -->
    <section class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-5">
                <h2 style="font-size: 2rem; margin-bottom: 10px;">NEURAL <span class="text-gradient">ACCESS</span></h2>
                <p style="color: #64748b; font-size: 0.95rem;">Authenticate to your cognitive node.</p>
            </div>

            <form>
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold small">Designation ID</label>
                    <input type="email" class="form-control" placeholder="user@aiforge.io">
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-2">
                        <label class="form-label text-muted fw-bold small">Passcode</label>
                        <a href="#" class="text-primary small text-decoration-none">Lost Key?</a>
                    </div>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <a href="dashboard.html" class="btn-af w-100 mt-2">
                    Initialize Link <i class="fa-solid fa-arrow-right ms-2"></i>
                </a>
            </form>

            <div class="mt-4 text-center small text-muted">
                New Protocol? <a href="signup.html" class="text-info fw-bold text-decoration-none">Initialize Here</a>
            </div>

            <div class="my-4 d-flex align-items-center justify-content-center gap-3">
                <div style="height: 1px; width: 50px; background: rgba(0,0,0,0.1);"></div>
                <span class="small text-muted">OR CONNECT VIA</span>
                <div style="height: 1px; width: 50px; background: rgba(0,0,0,0.1);"></div>
            </div>

            <div class="d-flex gap-3 justify-content-center mt-3">
                <a href="#"
                    class="btn-af glass p-2 rounded-circle d-flex align-items-center justify-content-center text-dark"
                    style="width: 48px; height: 48px;"><i class="fa-brands fa-google"></i></a>
                <a href="#"
                    class="btn-af glass p-2 rounded-circle d-flex align-items-center justify-content-center text-dark"
                    style="width: 48px; height: 48px;"><i class="fa-brands fa-github"></i></a>
            </div>

        </div>
    </section>

</body>

</html>
